services:
  api:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - thispot_data:/app/app/data
      - thispot_uploads:/app/app/uploads
      - thispot_outputs:/app/app/outputs
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "/app"
      THISPOT_BASE_URL: "http://localhost:8000"

volumes:
  thispot_data:
  thispot_uploads:
  thispot_outputs:
